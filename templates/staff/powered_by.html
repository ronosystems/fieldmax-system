<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powered By FieldMax</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    {% load static %}
    <style>
        :root {
            --navy-blue: #0a1929;
            --blue: #2563eb;
            --sky-blue: #7dd3fc;
            --black: #0f172a;
            --red: #ef4444;
            --white: #ffffff;
            --light-bg: #f8fafc;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #fbfdfd;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            margin: 0;
            overflow-x: hidden;
        }
        
        /* Subtle red accent line */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--red) 0%, var(--red) 5%, transparent 5%);
            z-index: 10;
        }
        
        /* Neon Blinking Animation */
        @keyframes neonBlink {
            0%, 100% {
                box-shadow: 0 25px 60px rgba(255, 255, 255, 0.9),
                            0 0 40px rgba(255, 255, 255, 0.6),
                            0 0 80px rgba(255, 255, 255, 0.3);
            }
            20% {
                box-shadow: 0 25px 60px rgba(0, 255, 0, 0.9),
                            0 0 40px rgba(0, 255, 0, 0.6),
                            0 0 80px rgba(0, 255, 0, 0.3);
            }
            40% {
                box-shadow: 0 25px 60px rgba(255, 0, 0, 0.9),
                            0 0 40px rgba(255, 0, 0, 0.6),
                            0 0 80px rgba(255, 0, 0, 0.3);
            }
            60% {
                box-shadow: 0 25px 60px rgba(0, 0, 255, 0.9),
                            0 0 40px rgba(0, 0, 255, 0.6),
                            0 0 80px rgba(0, 0, 255, 0.3);
            }
            80% {
                box-shadow: 0 25px 60px rgba(255, 255, 0, 0.9),
                            0 0 40px rgba(255, 255, 0, 0.6),
                            0 0 80px rgba(255, 255, 0, 0.3);
            }
        }
        
        .powered-card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            max-width: 1400px;
            width: 100%;
            position: relative;
            animation: neonBlink 5s ease-in-out infinite;
            transition: all 0.5s ease;
            min-height: 800px;
        }
        
        /* Add a pulsing effect to the border */
        .powered-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                rgb(255, 255, 255), 
                rgb(0, 255, 0), 
                rgb(255, 0, 0), 
                rgb(0, 0, 255), 
                rgb(255, 255, 0));
            border-radius: 32px;
            z-index: -1;
            animation: borderRotate 5s linear infinite;
            opacity: 0.5;
        }
        
        @keyframes borderRotate {
            0% {
                filter: blur(5px);
            }
            50% {
                filter: blur(10px);
            }
            100% {
                filter: blur(5px);
            }
        }
        
        .powered-header {
            /* Background image with overlay */
            background: linear-gradient(rgba(10, 25, 41, 0.7), rgba(15, 23, 42, 0.8)), url('{% static "images/DEV.jpg" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid var(--sky-blue);
            transition: opacity 0.5s ease, display 0.5s ease;
            height: 100%;
            min-height: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .powered-header.hide {
            opacity: 0;
            display: none;
        }
        
        .powered-header.show {
            opacity: 1;
            display: flex;
        }
        
        /* Sky blue wave - adjusted to be above background */
        .powered-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--sky-blue) 0%, var(--blue) 50%, var(--sky-blue) 100%);
            z-index: 5;
        }
        
        .powered-header h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0 10px;
            background: linear-gradient(135deg, var(--white) 0%, var(--sky-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .powered-header .subtitle {
            font-size: 1.5rem;
            color: var(--sky-blue);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .powered-header .contact-info {
            color: #fdfeff;
            font-size: 1.3rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--sky-blue);
            margin-top: 10px;
            position: relative;
            z-index: 3;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .logo-container {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--navy-blue), var(--blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
            border: 4px solid var(--sky-blue);
            position: relative;
            overflow: hidden;
            z-index: 3;
        }
        
        /* Red accent in logo */
        .logo-container::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--red);
            border-radius: 50%;
            top: 20px;
            right: 20px;
            opacity: 0.3;
            z-index: 4;
        }
        
        .logo-container i {
            font-size: 5rem;
            color: white;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* Neon Running Letters Container - Inside the card */
        .neon-running-container {
            position: relative;
            width: 100%;
            height: 800px;
            background: linear-gradient(135deg, var(--navy-blue) 0%, var(--black) 100%);
            display: none;
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            transition: opacity 0.5s ease, display 0.5s ease;
        }

        .neon-running-container.active {
            display: block;
        }

        .neon-running-container.hide {
            opacity: 0;
            display: none;
        }

        /* Two sections only */
        .section {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-bottom: 1px solid rgba(125, 211, 252, 0.2);
        }

        /* Section 1 - Top (Running Text) - 50% height */
        .section-1 {
            height: 50%;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.1), transparent);
        }

        /* Section 3 - Bottom (Fixed Image) - 50% height */
        .section-3 {
            height: 50%;
            background: linear-gradient(135deg, var(--navy-blue) 0%, var(--black) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Running text container */
        .running-text-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Individual letters container - ALL START FROM RIGHT END */
        .letters-container {
            position: absolute;
            display: flex;
            white-space: nowrap;
            font-family: 'Impact', 'Arial Black', 'Helvetica Bold', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            transform: translateX(100%);
            animation: slideText 12s linear forwards;
        }

        /* Section 1 letters - Sky Blue */
        .section-1 .letters-container {
            font-size: clamp(3rem, 10vw, 7rem);
            color: transparent;
            -webkit-text-stroke: 3px var(--sky-blue);
            text-shadow: 
                0 0 15px var(--sky-blue),
                0 0 30px var(--sky-blue),
                0 0 45px var(--blue);
        }

        /* Text animation */
        @keyframes slideText {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                transform: translateX(-300%);
                opacity: 0;
            }
        }

        /* Fixed Image Container - NO ANIMATION */
        .fixed-image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: imageFadeIn 2s ease-out forwards;
        }

        .fixed-image {
            height: 85%;
            width: auto;
            max-width: 90%;
            object-fit: contain;
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(125, 211, 252, 0.9),
                        0 0 120px rgba(37, 99, 235, 0.5);
            border: 5px solid var(--sky-blue);
            transition: all 0.3s ease;
            filter: brightness(1.1);
        }

        /* Image fade in animation only */
        @keyframes imageFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Individual letter styling */
        .letter {
            display: inline-block;
            margin: 0 5px;
            opacity: 0;
            animation: letterAppear 1.5s ease-out forwards;
            transform-origin: center;
        }

        /* Letter appear animation */
        @keyframes letterAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) translateX(20px);
                text-shadow: 0 0 0 transparent;
            }
            30% {
                opacity: 1;
                transform: scale(1.1);
            }
            60% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateX(0);
                text-shadow: 0 0 20px currentColor;
            }
        }

        /* ALL FIRST LETTERS APPEAR TOGETHER AT 0s */
        .section-1 .letter:nth-child(1) {
            animation-delay: 0s;
        }

        /* Sequential delays for remaining letters */
        .section-1 .letter:nth-child(2) { animation-delay: 0.1s; }
        .section-1 .letter:nth-child(3) { animation-delay: 0.2s; }
        .section-1 .letter:nth-child(4) { animation-delay: 0.3s; }
        .section-1 .letter:nth-child(5) { animation-delay: 0.4s; }
        .section-1 .letter:nth-child(6) { animation-delay: 0.5s; }
        .section-1 .letter:nth-child(7) { animation-delay: 0.6s; }
        .section-1 .letter:nth-child(8) { animation-delay: 0.7s; }
        .section-1 .letter:nth-child(9) { animation-delay: 0.8s; }
        .section-1 .letter:nth-child(10) { animation-delay: 0.9s; }
        .section-1 .letter:nth-child(11) { animation-delay: 1.0s; }
        .section-1 .letter:nth-child(12) { animation-delay: 1.1s; }
        .section-1 .letter:nth-child(13) { animation-delay: 1.2s; }
        .section-1 .letter:nth-child(14) { animation-delay: 1.3s; }
        .section-1 .letter:nth-child(15) { animation-delay: 1.4s; }
        .section-1 .letter:nth-child(16) { animation-delay: 1.5s; }
        .section-1 .letter:nth-child(17) { animation-delay: 1.6s; }
        .section-1 .letter:nth-child(18) { animation-delay: 1.7s; }
        .section-1 .letter:nth-child(19) { animation-delay: 1.8s; }
        .section-1 .letter:nth-child(20) { animation-delay: 1.9s; }
        .section-1 .letter:nth-child(21) { animation-delay: 2.0s; }
        .section-1 .letter:nth-child(22) { animation-delay: 2.1s; }
        .section-1 .letter:nth-child(23) { animation-delay: 2.2s; }
        .section-1 .letter:nth-child(24) { animation-delay: 2.3s; }
        .section-1 .letter:nth-child(25) { animation-delay: 2.4s; }
        .section-1 .letter:nth-child(26) { animation-delay: 2.5s; }
        .section-1 .letter:nth-child(27) { animation-delay: 2.6s; }
        .section-1 .letter:nth-child(28) { animation-delay: 2.7s; }
        .section-1 .letter:nth-child(29) { animation-delay: 2.8s; }
        .section-1 .letter:nth-child(30) { animation-delay: 2.9s; }

        /* Dotted pattern overlay */
        .dotted-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(125, 211, 252, 0.5) 2px, transparent 2px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 10;
            animation: dottedPulse 4s ease-in-out infinite;
        }

        @keyframes dottedPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Responsive adjustments */
        @media (max-width: 992px) {
            .powered-header {
                min-height: 600px;
            }
            
            .neon-running-container {
                height: 600px;
            }
            
            .fixed-image {
                height: 80%;
            }
        }

        @media (max-width: 768px) {
            .powered-header {
                padding: 40px 20px;
                min-height: 500px;
            }
            
            .powered-header h1 {
                font-size: 2.2rem;
            }
            
            .powered-header .subtitle {
                font-size: 1.1rem;
            }
            
            .powered-header .contact-info {
                font-size: 0.9rem;
                padding: 10px 15px;
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            
            .logo-container {
                width: 100px;
                height: 100px;
            }
            
            .logo-container i {
                font-size: 3.5rem;
            }
            
            .neon-running-container {
                height: 500px;
            }
            
            .section-1 .letters-container {
                font-size: clamp(2rem, 7vw, 3.5rem);
            }
            
            .fixed-image {
                height: 75%;
            }
        }
    </style>
    {% load static %}
</head>
<body>
    <!-- Main Card Container -->
    <div class="powered-card" id="poweredCard">
        <!-- Banner Header with DEV.jpg background -->
        <div class="powered-header show" id="bannerHeader">
            <div class="logo-container">
                <i class="fas fa-bolt"></i>
            </div>
            <h1>Powered By FieldMax</h1>
            <p class="subtitle">✅ Experts In Business System Automation 💻</p>
            <div class="contact-info">
                <i class="fas fa-envelope me-2"></i> fieldmaxdevteam@gmail.com
                <i class="fas fa-phone-alt me-2 ms-4"></i> +254 722 558 544
                <i class="fas fa-globe me-2 ms-4"></i> fieldmaxdevteam.com
            </div>
        </div>

        <!-- Neon Running Letters Container -->
        <div class="neon-running-container" id="neonContainer">
            <div class="dotted-overlay"></div>
            
            <!-- Section 1 - Top (Running Text) -->
            <div class="section section-1">
                <div class="running-text-wrapper">
                    <div class="letters-container">
                        <span class="letter">F</span>
                        <span class="letter">I</span>
                        <span class="letter">E</span>
                        <span class="letter">L</span>
                        <span class="letter">D</span>
                        <span class="letter">M</span>
                        <span class="letter">A</span>
                        <span class="letter">X</span>
                        <span class="letter">&nbsp;</span>
                        <span class="letter">D</span>
                        <span class="letter">E</span>
                        <span class="letter">V</span>
                        <span class="letter">&nbsp;</span>
                        <span class="letter">T</span>
                        <span class="letter">E</span>
                        <span class="letter">A</span>
                        <span class="letter">M</span>
                        <span class="letter">&nbsp;</span>
                        <span class="letter">0</span>
                        <span class="letter">7</span>
                        <span class="letter">2</span>
                        <span class="letter">2</span>
                        <span class="letter">&nbsp;</span>
                        <span class="letter">5</span>
                        <span class="letter">5</span>
                        <span class="letter">8</span>
                        <span class="letter">&nbsp;</span>
                        <span class="letter">5</span>
                        <span class="letter">4</span>
                        <span class="letter">4</span>
                    </div>                    
                </div>
            </div>
            
            <!-- Section 3 - Bottom (Fixed Image - NO RUNNING) -->
            <div class="section section-3">
                <div class="fixed-image-container">
                    <img src="{% static 'images/IMG01.png' %}" alt="FieldMax Image 1" class="fixed-image">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bannerHeader = document.getElementById('bannerHeader');
            const neonContainer = document.getElementById('neonContainer');
            
            // Animation duration in milliseconds
            const TEXT_ANIMATION_DURATION = 12000; // 12 seconds for text
            const BANNER_DURATION = 5000; // 5 seconds
            
            // Show banner initially, hide neon
            bannerHeader.classList.add('show');
            bannerHeader.classList.remove('hide');
            neonContainer.classList.remove('active');
            
            // Function to start neon animation
            function startNeonAnimation() {
                // Show neon, hide banner
                bannerHeader.classList.remove('show');
                bannerHeader.classList.add('hide');
                neonContainer.classList.add('active');
                neonContainer.classList.remove('hide');
                
                // After text animation completes, switch back to banner
                setTimeout(function() {
                    if (neonContainer.classList.contains('active')) {
                        switchToBanner();
                    }
                }, TEXT_ANIMATION_DURATION);
            }
            
            function switchToBanner() {
                bannerHeader.classList.add('show');
                bannerHeader.classList.remove('hide');
                neonContainer.classList.remove('active');
                neonContainer.classList.add('hide');
                
                // After banner duration, switch back to neon
                setTimeout(function() {
                    if (bannerHeader.classList.contains('show')) {
                        startNeonAnimation();
                    }
                }, BANNER_DURATION);
            }
            
            // Start the cycle - Show banner first for 5 seconds
            setTimeout(startNeonAnimation, BANNER_DURATION);
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
