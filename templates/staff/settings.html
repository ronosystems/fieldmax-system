<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FieldMax Staff Portal</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #002ae4 0%, #008cff 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .settings-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .settings-header {
            background: linear-gradient(135deg, #ff0000 0%, #ff0000 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .settings-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }
        
        .settings-header h1 i {
            margin-right: 15px;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .back-btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
        }
        
        .settings-body {
            padding: 40px;
        }
        
        .settings-placeholder {
            text-align: center;
            padding: 60px 20px;
        }
        
        .placeholder-icon {
            font-size: 5rem;
            color: #667eea;
            opacity: 0.5;
            margin-bottom: 20px;
        }
        
        .placeholder-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }
        
        .placeholder-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline-secondary {
            border: 2px solid #6c757d;
            color: #6c757d;
            background: transparent;
        }
        
        .btn-outline-secondary:hover {
            background: #6c757d;
            color: white;
        }
        
        .mt-4 {
            margin-top: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .settings-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            
            .settings-body {
                padding: 20px;
            }
            
            .btn {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <!-- Settings Card -->
        <div class="settings-card">
            <!-- Header -->
            <div class="settings-header">
                <h1>
                    <i class="fas fa-cog"></i>
                    Settings
                </h1>
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-arrow-left me-2"></i>Back
                </a>
            </div>

            <!-- Body -->
            <div class="settings-body">
                <div class="settings-placeholder">
                    <div class="placeholder-icon">
                        <i class="fas fa-tools"></i>
                    </div>
                    <h2 class="placeholder-title">Settings Coming Soon</h2>
                    <p class="placeholder-text">
                        The settings page is currently under development. 
                        Check back later for configuration options.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Go Back
                        </a>
                        <a href="{% url 'staff:staff_dashboard' %}" class="btn btn-primary">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
